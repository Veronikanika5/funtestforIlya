<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Небольшая игра для Ильи</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Comic Sans MS', cursive;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    transition: background 0.8s ease-in-out;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.3);
    pointer-events: none;
    z-index: 0;
}

.overlay {
    background: rgba(255,255,255,0.92);
    padding: 35px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,0.2);
    z-index: 1;
}

h1 {
    color: #ff4d6d;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

.correct {
    background-color: #ff4d6d;
    color: white;
}

.wrong {
    background-color: white;
    color: #ff4d6d;
    position: relative;
}

button:hover {
    transform: scale(1.1);
}

#game {
    display: none;
}

.final-text {
    color: #ff4d6d;
    font-size: 34px;
    font-weight: bold;
    text-shadow: 0 0 15px #fff;
}

.heart {
    position: fixed;
    animation: float 4s linear infinite;
    z-index: 2;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1;}
    100% { transform: translateY(-100vh); opacity: 0;}
}
</style>
</head>

<body>

<div id="startScreen" class="overlay">
    <h1>Илья… у меня для тебя кое-что есть 😏</h1>
    <button onclick="startGame()">Заинтриговала 👀</button>
</div>

<div id="game" class="overlay">
    <h1 id="question"></h1>
    <div id="buttons"></div>
</div>

<script>
const backgrounds = [
"https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif",
"https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif",
"https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif",
"https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif",
"https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif",
"https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif",
"https://media.giphy.com/media/xT0xeJpnrWC4XWblEk/giphy.gif",
"https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif",
"https://media.giphy.com/media/26xBvQa5dyU3ADkJ6/giphy.gif",
"https://media.giphy.com/media/l4FGuhL4U2WyjdkaY/giphy.gif",
"https://media.giphy.com/media/3o7btPCcdNniyf0ArS/giphy.gif",
"https://media.giphy.com/media/3o6ZtaO9BZHcOjmErm/giphy.gif",
"https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif",
"https://media.giphy.com/media/26FPJGjhefSJuaRhu/giphy.gif",
"https://media.giphy.com/media/3oEdv4hwWTpx6Yz1Ac/giphy.gif"
];

const funnyPhrases = [
"Не туда 😏",
"Ммм, мимо 😄",
"Ты рискуешь 😌",
"Попробуй ещё 😉",
"Я запомню это 😏",
"Серьёзно? 😄",
"Хитрый ход 😏",
"Не угадал 😜",
"Я ожидала другого 😌",
"Ещё шанс 😉"
];

const questions = [
{ text: "Если я посмотрю на тебя слишком долго… ты что сделаешь? 😏", answers: ["Посмотрю в ответ 😉", "Сделаю вид, что не заметил 😅"] },
{ text: "Ты любишь немного напряжения между людьми? 👀", answers: ["Да, это интересно 😏", "Я за спокойствие 😄"] },
{ text: "Если мы окажемся вдвоём вечером… 🤫", answers: ["Будет весело 😉", "Посидим спокойно 😌"] },
{ text: "Ты больше про действия или намёки? 😏", answers: ["Намёки — это искусство 😌", "Сразу к делу 😄"] },
{ text: "Ты умеешь сводить с ума взглядом? 👀", answers: ["Иногда получается 😏", "Я скромный 😄"] },
{ text: "Что интереснее: разговор или пауза между словами? 🤫", answers: ["Пауза… 😏", "Разговор 😄"] },
{ text: "Если я скажу «мне интересно с тобой»…", answers: ["Я продолжу 😉", "Сделаю вид, что не понял 😄"] },
{ text: "Ты любишь лёгкую провокацию? 😏", answers: ["Очень 😌", "Я осторожный 😄"] },
{ text: "Если станет слишком весело…", answers: ["Я не остановлюсь 😏", "Сбавлю темп 😄"] },
{ text: "Ты умеешь удивлять? 🎭", answers: ["Конечно 😉", "Иногда 😄"] },
{ text: "Ты бы рискнул познакомиться ближе? 😏", answers: ["Да 😌", "Посмотрим 😄"] },
{ text: "Что сильнее цепляет: улыбка или взгляд? 👀", answers: ["Взгляд 😏", "Улыбка 😄"] },
{ text: "Ты веришь в случайные совпадения? 😉", answers: ["Нет, это судьба 😏", "Иногда 😄"] },
{ text: "Если всё зайдёт слишком далеко…", answers: ["Посмотрим куда 😉", "Остановлюсь 😄"] },
{ text: "И честно… тебе сейчас интересно? 😏", answers: ["Да, очень 😉", "Ну… немного 😄"] }
];

let currentQuestion = 0;
const questionEl = document.getElementById("question");
const buttonsEl = document.getElementById("buttons");

function changeBackground() {
    document.body.style.background = 
        `url("${backgrounds[currentQuestion]}") center/contain no-repeat fixed`;
}

function startGame() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("game").style.display = "block";
    changeBackground();
    showQuestion();
}

function showQuestion() {
    buttonsEl.innerHTML = "";
    questionEl.innerText = questions[currentQuestion].text;

    questions[currentQuestion].answers.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.innerText = answer;

        if (index === 0) {
            btn.classList.add("correct");
            btn.onclick = nextQuestion;
        } else {
            btn.classList.add("wrong");
            btn.onmouseover = () => {
                const x = Math.random() * (window.innerWidth - 150);
                const y = Math.random() * (window.innerHeight - 50);
                btn.style.position = "absolute";
                btn.style.left = x + "px";
                btn.style.top = y + "px";
                btn.innerText = funnyPhrases[Math.floor(Math.random() * funnyPhrases.length)];
            };
        }

        buttonsEl.appendChild(btn);
    });
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < questions.length) {
        changeBackground();
        showQuestion();
    } else {
        showFinal();
    }
}

<script>
function showFinal() {
    questionEl.innerHTML = "";
    buttonsEl.innerHTML = "";

    const finalText = document.createElement("div");
    finalText.classList.add("final-text");

    finalText.innerHTML = `
    Илья… 💫<br><br>
    Кажется, ты только что прошёл не просто тест 😏<br><br>
    Теперь у меня к тебе маленький вопрос...<br><br>
    <b>ты напишешь мне первым или мне продолжить эту игру? 😉</b>
    `;

    document.getElementById("game").appendChild(finalText);

    // 💖 красивые сердечки
    for (let i = 0; i < 100; i++) {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = Math.random() > 0.5 ? "💖" : "✨";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 25 + 15) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }

    // 🎵 лёгкий "вау" эффект — вибрация (если с телефона)
    if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100]);
    }
}
</script>
