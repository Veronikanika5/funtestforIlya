<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Игра для тебя Илья ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Comic Sans MS', cursive;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    transition: background 0.8s ease-in-out;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 0;
}

.overlay {
    background: rgba(255,255,255,0.92);
    padding: 35px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,0.2);
    z-index: 1;
    max-width: 500px;
}

h1 { color: #ff4d6d; }

button {
    padding: 14px 25px;
    font-size: 17px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 8px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.correct {
    background-color: #ff4d6d;
    color: white;
}

.wrong {
    background-color: white;
    color: #ff4d6d;
    position: relative;
}

#game { display: none; }

.final-text {
    color: #ff4d6d;
    font-weight: bold;
    text-align: center;
}

.heart {
    position: fixed;
    animation: float 4s linear infinite;
    z-index: 2;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1;}
    100% { transform: translateY(-100vh); opacity: 0;}
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
}

.typing {
    font-size: 18px;
    color: #555;
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="startScreen" class="overlay">
    <h1> у меня для тебя кое-что есть 😏</h1>
    <button onclick="startGame()">нууу допустим 👀</button>
</div>

<div id="game" class="overlay">
    <h1 id="question"></h1>
    <div id="buttons"></div>
</div>

<script>


const funnyPhrases = [
"Не туда 😏",
"Попробуй ещё 😉",
"Я запомню это 😌",
"Ммм, мимо 😄",
"Ты рискуешь 😏",
"Почти 😄",
"Серьёзно? 😏",
"Хитрый ход 😌",
"Не угадал 😜",
"Я ожидала другого 😉",
"Ещё шанс 😏",
"Ну-ну 😄",
"Ты меня проверяешь? 😏",
"Я же вижу 😌",
"Не прокатило 😉",
"Ты специально? 😄",
"Я так и думала 😏",
"Мило, но нет 😌",
"Почти убедил 😄",
"Хорошая попытка 😉"
];

const questions = [
{ text: "Если я была бы сейчас рядом… что бы ты сделал? 😏", answers: ["Стал бы ближе 😉", "Пристал и сорвал бы с тебя одежду😄"] },
{ text: "Ты любишь, когда между людьми есть искра? ⚡", answers: ["Очень 😏", "Я спокойный 😄"] },
{ text: "Что интереснее: слова или взгляд? 👀", answers: ["Взгляд… 😏", "Слова 😄"] },
{ text: "Ты умеешь делать первый шаг? 😉", answers: ["Иногда да 😌", "Жду знака 😄"] },
{ text: "Если становится немного неловко…", answers: ["Это даже интересно 😏", "Я отступаю 😄"] },
{ text: "Ты веришь в «не случайные» знакомства? 💫", answers: ["Да 😌", "Иногда 😄"] },
{ text: "Если я немного флиртую…", answers: ["Я тебя понял 😉", "Сделаю вид что не понял 😄"] },
{ text: "Ты больше про игру или серьёзность? 🎭", answers: ["Люблю игру 😏", "Я серьёзный 😄"] },
{ text: "Ты умеешь удивлять? 😌", answers: ["Да 😉", "Стараюсь 😄"] },
{ text: "Если станет интересно…", answers: ["Я продолжу 😏", "Посмотрю 😄"] },
{ text: "Ты любишь риск? 😏", answers: ["Иногда 😌", "Не очень 😄"] },
{ text: "Что сильнее цепляет? 😌", answers: ["Атмосфера 😏", "Слова 😄"] },
{ text: "Ты бы захотел узнать меня лучше? 👀", answers: ["Да 😉", "Возможно 😄"] },
{ text: "Если я скажу «мне с тобой интересно»…", answers: ["Я продолжу 😏", "Улыбнусь 😄"] },
{ text: "И последний вопрос… ты чувствуешь это? 😏", answers: ["Да… 😉", "Может быть 😄"] }
];

let currentQuestion = 0;
const q = document.getElementById("question");
const b = document.getElementById("buttons");

function startGame(){
document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";
next();
}

function bg(){
document.body.style.background =
`url("${backgrounds[currentQuestion % backgrounds.length]}") center/cover no-repeat`;
}

function next(){
if(currentQuestion < questions.length){
bg();
show();
}else{
final();
}
}

function show(){
b.innerHTML="";
q.innerText = questions[currentQuestion].text;

questions[currentQuestion].answers.forEach((a,i)=>{
let btn=document.createElement("button");
btn.innerText=a;

if(i===0){
btn.className="correct";
btn.onclick=()=>{
currentQuestion++;
next();
};
}else{
btn.className="wrong";
btn.onmouseover=()=>{
btn.style.position="absolute";
btn.style.left=Math.random()*80+"%";
btn.style.top=Math.random()*80+"%";
btn.innerText = funnyPhrases[Math.floor(Math.random()*funnyPhrases.length)];
};
}

b.appendChild(btn);
});
}

function final(){
q.innerHTML="";
b.innerHTML="";

document.body.style.background =
`url("https://media.tenor.com/3o6Zt481isNVuQI1l6AAAAM/stars.gif") center/cover no-repeat`;

const wrap = document.createElement("div");
wrap.className="final-text";

wrap.innerHTML=`
<div style="font-size:130px;color:#ff4d6d;animation:pulse 1.5s infinite;">❤</div>

<div style="margin-top:-10px;font-size:20px;line-height:1.4;">

Илья… 💘<br><br>

это было чуть интереснее, чем просто игра 😏<br><br>

<b>и ты как-то слишком уверенно всё прошёл…</b><br><br>

это даже немного цепляет 😉<br><br>

<span style="opacity:0.8;">дальше уже не кнопки 💭</span><br><br>

<button onclick="goToChat()">написать мне 💬</button>

<div class="typing">печатает сообщение…</div>

</div>
`;

document.getElementById("game").appendChild(wrap);

for(let i=0;i<80;i++){
let el=document.createElement("div");
el.className="heart";
el.innerHTML=Math.random()>0.5?"💖":"✨";
el.style.left=Math.random()*100+"vw";
el.style.fontSize=(10+Math.random()*20)+"px";
document.body.appendChild(el);
setTimeout(()=>el.remove(),5000);
}
}

function goToChat(){
window.open("https://t.me/n1kas_sk","_blank");
}

</script>

</body>
</html>
