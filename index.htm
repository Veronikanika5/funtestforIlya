<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Игра для Ильи</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Comic Sans MS', cursive;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: 0.8s;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 0;
}

.overlay {
    background: rgba(255,255,255,0.92);
    padding: 35px;
    border-radius: 25px;
    text-align: center;
    z-index: 1;
    max-width: 500px;
}

h1 { color: #ff4d6d; }

button {
    padding: 14px 25px;
    font-size: 17px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 8px;
    transition: 0.3s;
}

.correct {
    background: #ff4d6d;
    color: white;
}

.wrong {
    background: white;
    color: #ff4d6d;
    position: relative;
}

button:hover { transform: scale(1.1); }

#game { display: none; }

.final-text {
    color: #ff4d6d;
    font-size: 28px;
    font-weight: bold;
}

.heart {
    position: fixed;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity:1; }
    100% { transform: translateY(-100vh); opacity:0; }
}
</style>
</head>

<body>

<div id="startScreen" class="overlay">
    <h1>Илья… у меня кое-что есть 😏</h1>
    <button onclick="startGame()">Открыть</button>
</div>

<div id="game" class="overlay">
    <h1 id="question"></h1>
    <div id="buttons"></div>
</div>

<script>

let currentQuestion = 0;

let flirt = 0;
let humor = 0;
let chill = 0;

const backgrounds = [
"https://media.tenor.com/7cAOc2fKOcEAAAAM/adventure-time.gif",
"https://media.tenor.com/dStJVtPNiTUAAAAM/jake.gif",
"https://media.tenor.com/3oEjI6SIIHBdRxXI40AAAAM/laugh.gif",
"https://media.tenor.com/l0HlBO7eyXzSZkJriAAAAM/funny.gif",
"https://media.tenor.com/26FPJGjhefSJuaRhuAAAAM/dog.gif",
"https://media.tenor.com/xT0xeJpnrWC4XWblEkAAAAM/wtf.gif",
"https://media.tenor.com/l4FGuhL4U2WyjdkaYAAAAM/cute.gif",
"https://media.tenor.com/3o6Zt481isNVuQI1l6AAAAM/stars.gif",
"https://media.tenor.com/JIX9t2j0ZTN9SAAAAM/cat.gif",
"https://media.tenor.com/26xBvQa5dyU3ADkJ6AAAAM/dance.gif"
];

const funny = [
"Не туда 😏","Попробуй ещё 😉","Мимо 😄","Я запомню 😌",
"Ты рискуешь 😏","Хитро 😄","Почти 😉","Не-а 😏"
];

const questions = [
{ text:"Если я рядом — ты бы… 😏", answers:["Подошёл ближе 😉","Сделал вид что занят 😄"] },
{ text:"Ты любишь лёгкое напряжение между людьми? 👀", answers:["Да 😏","Нет 😄"] },
{ text:"Что сильнее — взгляд или слова? 😌", answers:["Взгляд 😏","Слова 😄"] },
{ text:"Ты умеешь делать первый шаг? 😉", answers:["Иногда 😌","Редко 😄"] },
{ text:"Если становится интересно…", answers:["Продолжаю 😏","Смотрю со стороны 😄"] },
{ text:"Ты веришь в совпадения? 💭", answers:["Да 😌","Не всегда 😄"] },
{ text:"Флирт — это…", answers:["Игра 😏","Шутка 😄"] },
{ text:"Ты любишь риск? 😏", answers:["Иногда 😌","Нет 😄"] },
{ text:"Что цепляет больше?", answers:["Атмосфера 😏","Логика 😄"] },
{ text:"Ты бы продолжил этот разговор? 👀", answers:["Да 😉","Не уверен 😄"] }
];

const q = document.getElementById("question");
const b = document.getElementById("buttons");

function startGame(){
document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";
next();
}

function bg(){
document.body.style.background=`url("${backgrounds[currentQuestion]}") center/cover no-repeat`;
}

function next(){
if(currentQuestion<questions.length){
bg();
show();
}else{
final();
}
}

function show(){
b.innerHTML="";
q.innerText=questions[currentQuestion].text;

questions[currentQuestion].answers.forEach((a,i)=>{
let btn=document.createElement("button");
btn.innerText=a;

if(i===0){
btn.className="correct";
btn.onclick=()=>{
flirt++;
currentQuestion++;
next();
};
}else{
btn.className="wrong";
btn.onmouseover=()=>{
humor++;
btn.style.position="absolute";
btn.style.left=Math.random()*80+"%";
btn.style.top=Math.random()*80+"%";
btn.innerText=funny[Math.floor(Math.random()*funny.length)];
};
}

b.appendChild(btn);
});
}

function final(){
q.innerHTML="";
b.innerHTML="";

document.body.style.background="url('https://media.tenor.com/3o6Zt481isNVuQI1l6AAAAM/stars.gif') center/cover";

let text="";

if(flirt>=5){
text=`Илья… 😏<br><br>
ты явно не просто нажимал кнопки…<br>
ты играл как будто знал, что это про тебя 💭<br><br>
<b>и это немного слишком интересно 😉</b>`;
}
else if(humor>flirt){
text=`Илья… 😄<br><br>
ты больше смеялся, чем думал 😏<br>
и это даже приятно 💭<br><br>
<b>с тобой явно не скучно 😉</b>`;
}
else{
text=`Илья… 😌<br><br>
ты спокойный и внимательный…<br>
и это тоже цепляет 💭<br><br>
<b>такие люди раскрываются позже 😉</b>`;
}

let d=document.createElement("div");
d.className="final-text";
d.innerHTML=text;

document.getElementById("game").appendChild(d);

for(let i=0;i<60;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML=Math.random()>0.5?"💖":"✨";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(10+Math.random()*20)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
}
}

</script>

</body>
</html>
