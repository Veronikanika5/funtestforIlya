<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Игра для Ильи</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Comic Sans MS', cursive;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    transition: background 0.8s ease-in-out;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 0;
}

.overlay {
    background: rgba(255,255,255,0.92);
    padding: 35px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,0.2);
    z-index: 1;
    max-width: 500px;
}

h1 {
    color: #ff4d6d;
}

button {
    padding: 14px 25px;
    font-size: 17px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 8px;
    transition: 0.3s;
}

.correct {
    background-color: #ff4d6d;
    color: white;
}

.wrong {
    background-color: white;
    color: #ff4d6d;
    position: relative;
}

button:hover {
    transform: scale(1.1);
}

#game { display: none; }

.final-text {
    color: #ff4d6d;
    font-size: 28px;
    font-weight: bold;
}

.heart {
    position: fixed;
    animation: float 4s linear infinite;
    z-index: 2;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1;}
    100% { transform: translateY(-100vh); opacity: 0;}
}

.typing {
    font-size: 20px;
    color: #555;
    margin-top: 15px;
}
</style>
</head>

<body>

<div id="startScreen" class="overlay">
    <h1>Илья… у меня для тебя кое-что есть 😏</h1>
    <button onclick="startGame()">Открыть 👀</button>
</div>

<div id="game" class="overlay">
    <h1 id="question"></h1>
    <div id="buttons"></div>
</div>

<script>

// 🔥 стабильные гифки
const backgrounds = [
"https://media.tenor.com/7cAOc2fKOcEAAAAM/adventure-time.gif",
"https://media.tenor.com/dStJVtPNiTUAAAAM/adventuretime-jake.gif",
"https://media.tenor.com/1snEvE1Gv-IAAAAM/bailar-jake.gif",
"https://media.tenor.com/XXp0jOxwfD8AAAAM/jake-scream.gif",
"https://media.tenor.com/3o7aD2saalBwwftBIYAAAAM/cat-funny.gif",
"https://media.tenor.com/JIX9t2j0ZTN9SAAAAM/cat.gif",
"https://media.tenor.com/l0HlBO7eyXzSZkJriAAAAM/funny.gif",
"https://media.tenor.com/26xBvQa5dyU3ADkJ6AAAAM/dance.gif",
"https://media.tenor.com/l4FGuhL4U2WyjdkaYAAAAM/cute.gif",
"https://media.tenor.com/xT0xeJpnrWC4XWblEkAAAAM/wtf.gif",
"https://media.tenor.com/3oEjI6SIIHBdRxXI40AAAAM/laugh.gif",
"https://media.tenor.com/26FPJGjhefSJuaRhuAAAAM/dog.gif",
"https://media.tenor.com/l0MYt5jPR6QX5pnqMAAAAM/meme.gif",
"https://media.tenor.com/3oEdv4hwWTpx6Yz1AcAAAAM/lol.gif",
"https://media.tenor.com/3o6Zt481isNVuQI1l6AAAAM/cute.gif"
];

const funnyPhrases = [
"Не туда 😏",
"Попробуй ещё 😉",
"Я запомню это 😌",
"Ммм, мимо 😄",
"Ты рискуешь 😏",
"Почти 😄",
"Серьёзно? 😏",
"Хитрый ход 😌",
"Не угадал 😜",
"Я ожидала другого 😉",
"Ещё шанс 😏",
"Ну-ну 😄",
"Ты меня проверяешь? 😏",
"Я же вижу 😌",
"Не прокатило 😉",
"Ты специально? 😄",
"Я так и думала 😏",
"Мило, но нет 😌",
"Почти убедил 😄",
"Хорошая попытка 😉"
];

// 💘 интрига + флирт
const questions = [
{ text: "Если я сейчас рядом… ты бы что сделал? 😏", answers: ["Стал бы ближе 😉", "Сделал вид, что занят 😄"] },
{ text: "Ты любишь, когда между людьми есть искра? ⚡", answers: ["Очень 😏", "Я спокойный 😄"] },
{ text: "Что интереснее: слова или взгляд? 👀", answers: ["Взгляд… 😏", "Слова 😄"] },
{ text: "Ты умеешь делать первый шаг? 😉", answers: ["Иногда да 😌", "Жду знака 😄"] },
{ text: "Если становится немного неловко…", answers: ["Это даже интересно 😏", "Я отступаю 😄"] },
{ text: "Ты веришь в «не случайные» знакомства? 💫", answers: ["Да 😌", "Иногда 😄"] },
{ text: "Если я немного флиртую…", answers: ["Я тебя ухххх😉", "Сделаю вид что не понял 😄"] },
{ text: "Ты больше про игру или серьёзность? 🎭", answers: ["Люблю игру 😏", "Я серьёзный 😄"] },
{ text: "Ты умеешь удивлять? 😌", answers: ["Да 😉", "Стараюсь 😄"] },
{ text: "Если станет интересно…", answers: ["Я продолжу 😏", "Посмотрю 😄"] },
{ text: "Ты любишь риск? 😏", answers: ["Иногда 😌", "Не очень 😄"] },
{ text: "Что сильнее цепляет? 😌", answers: ["Атмосфера 😏", "Слова 😄"] },
{ text: "Ты бы захотел узнать меня лучше? 👀", answers: ["Да 😉", "Возможно 😄"] },
{ text: "Если я скажу «мне с тобой интересно»…", answers: ["Я продолжу 😏", "Улыбнусь 😄"] },
{ text: "И последний вопрос… ты чувствуешь это? 😏", answers: ["Да… 😉", "Может быть 😄"] }
];

let currentQuestion = 0;
const questionEl = document.getElementById("question");
const buttonsEl = document.getElementById("buttons");

function changeBackground() {
    document.body.style.background =
    `url("${backgrounds[currentQuestion]}") center/contain no-repeat fixed`;
}

function startGame() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("game").style.display = "block";
    changeBackground();
    showQuestion();
}

function showQuestion() {
    buttonsEl.innerHTML = "";
    questionEl.innerText = questions[currentQuestion].text;

    questions[currentQuestion].answers.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.innerText = answer;

        if (index === 0) {
            btn.classList.add("correct");
            btn.onclick = nextQuestion;
        } else {
            btn.classList.add("wrong");
            btn.onmouseover = () => {
                btn.style.position = "absolute";
                btn.style.left = Math.random()*80 + "%";
                btn.style.top = Math.random()*80 + "%";
                btn.innerText = funnyPhrases[Math.floor(Math.random()*funnyPhrases.length)];
            };
        }

        buttonsEl.appendChild(btn);
    });
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < questions.length) {
        changeBackground();
        showQuestion();
    } else {
        showFinal();
    }
}

// 💥 ФИНАЛ
function showFinal() {
    questionEl.innerHTML = "";
    buttonsEl.innerHTML = "";

    const finalText = document.createElement("div");
    finalText.classList.add("final-text");

    finalText.innerHTML = `
    Илья… 💘<br><br>
    Кажется, это было не просто так 😏<br><br>
    <b>Напишешь мне первым… или мне продолжить? 😉</b>
    <br><br>
    <button onclick="goToChat()">Написать мне 💬</button>
    <div class="typing">печатает сообщение…</div>
    `;

    document.getElementById("game").appendChild(finalText);

    // 💖 анимация
    for (let i = 0; i < 100; i++) {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = Math.random()>0.5 ? "💖":"✨";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.fontSize = (Math.random()*20+15)+"px";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),5000);
    }
}

// 👉 ВСТАВЬ СЮДА СВОЙ ЮЗЕР
function goToChat(){
    window.open("https://t.me/@n1kas_sk","_blank");
}

</script>

</body>
</html>
